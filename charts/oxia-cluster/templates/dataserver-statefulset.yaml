apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    {{- include "oxia-cluster.server.labels" . | nindent 4 }}
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      {{- include "oxia-cluster.server.selectorLabels" . | nindent 6 }}
  serviceName: {{ .Release.Name }}-svc
  podManagementPolicy: Parallel
  template:
    metadata:
      annotations:
        prometheus.io/port: "{{ include "oxia-cluster.port" .Values.server.config.observability.metric.bindAddress }}"
        prometheus.io/scrape: "{{ .Values.monitoringEnabled }}"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        oxia_cluster: {{ .Release.Name }}
        {{- include "oxia-cluster.server.labels" . | nindent 8 }}
      name: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        fsGroup: 10001
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "oxia-cluster.server.selectorLabels" . | nindent 20 }}
                topologyKey: topology.kubernetes.io/zone
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - command:
            - "oxia"
            - "server"
            - "--sconfig=/oxia/conf/dataserver.yaml"
            {{- if .Values.pprofEnabled }}
            - "--profile"
            {{- end}}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: server
          {{- with .Values.serverEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - containerPort: {{ include "oxia-cluster.port" .Values.server.config.server.public.bindAddress | int }}
              name: public
            - containerPort: {{ include "oxia-cluster.port" .Values.server.config.server.internal.bindAddress | int }}
              name: internal
            - containerPort: {{ include "oxia-cluster.port" .Values.server.config.observability.metric.bindAddress | int }}
              name: ds-metrics
          resources:
            requests:
              cpu: {{ .Values.server.cpu }}
              memory: {{ .Values.server.memory }}
            limits:
              cpu: {{ .Values.server.cpu }}
              memory: {{ .Values.server.memory }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: daemon-config
              mountPath: /oxia/conf
              readOnly: true
          livenessProbe:
            {{- include "oxia-cluster.probe" (include "oxia-cluster.port" .Values.server.config.server.internal.bindAddress) | nindent 12 }}
          readinessProbe:
            {{- include "oxia-cluster.readiness-probe" (include "oxia-cluster.port" .Values.server.config.server.internal.bindAddress) | nindent 12 }}
          startupProbe:
            {{- include "oxia-cluster.startup-probe" (include "oxia-cluster.port" .Values.server.config.server.internal.bindAddress) | nindent 12 }}
        - command:
            - "oxia"
            - "coordinator"
            - "--sconfig=/oxia/conf/coordinator.yaml"
            - "--cconfig=configmap:{{ .Release.Namespace }}/{{ .Release.Name }}-coordinator"
            {{- if .Values.pprofEnabled }}
            - "--profile"
            {{- end}}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: coordinator
          {{- with .Values.coordinatorEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - containerPort: {{ include "oxia-cluster.port" .Values.coordinator.config.server.internal.bindAddress | int }}
              name: coord-internal
            - containerPort: {{ include "oxia-cluster.port" .Values.coordinator.config.observability.metric.bindAddress | int }}
              name: co-metrics
          resources:
            requests:
              cpu: {{ .Values.coordinator.cpu }}
              memory: {{ .Values.coordinator.memory }}
            limits:
              cpu: {{ .Values.coordinator.cpu }}
              memory: {{ .Values.coordinator.memory }}
          volumeMounts:
            - name: daemon-config
              mountPath: /oxia/conf
              readOnly: true
          livenessProbe:
            {{- include "oxia-cluster.probe" (include "oxia-cluster.port" .Values.coordinator.config.server.internal.bindAddress) | nindent 12 }}
          readinessProbe:
            {{- include "oxia-cluster.probe" (include "oxia-cluster.port" .Values.coordinator.config.server.internal.bindAddress) | nindent 12 }}
      volumes:
        - name: daemon-config
          configMap:
            name: {{ .Release.Name }}-daemon
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.server.storageClassName }}
        storageClassName: {{ .Values.server.storageClassName }}
        {{- end}}
        resources:
          requests:
            storage: {{ .Values.server.storage }}
